version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: magento-nginx

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./magento:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

    depends_on:
      - php

    networks:
      - magento-net

  php:
    build:
      context: ./php

    container_name: magento-php

    restart: unless-stopped

    volumes:
      - ./magento:/var/www/html
      - ./php/conf.d/magento.ini:/usr/local/etc/php/conf.d/magento.ini

    depends_on:
      - mysql
      - redis
      - opensearch

    networks:
      - magento-net

  mysql:
    image: mysql:${MYSQL_VERSION}
    container_name: magento-mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    command:
      - --innodb-buffer-pool-size=128M
      - --max_connections=50

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - magento-net

  redis:
    image: redis:${REDIS_VERSION}
    container_name: magento-redis

    restart: unless-stopped

    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru

    networks:
      - magento-net

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION}
    container_name: magento-opensearch

    restart: unless-stopped

    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms256m -Xmx256m"
      DISABLE_SECURITY_PLUGIN: "true"

    volumes:
      - opensearch_data:/usr/share/opensearch/data

    networks:
      - magento-net

networks:
  magento-net:
    driver: bridge

volumes:
  mysql_data:
  opensearch_data:
